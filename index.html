<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepak Maurya - Portfolio</title>
    <link rel="shortcut icon" href="images/userAsset/UserImage.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- main wrapper -->
    <div id="wrapper">

        <div class="container">

            <!-- navbar -->
            <div class="navbar">

                <div class="logo-container">
                    <img src="images/userAsset/NavLogo.png" class="logo">
                    <div class="logo-text">eepak Maurya</div>
                </div>

                <div class="nav-items">
                    <div><a href="#projects">Projects</a></div>
                    <div><a href="#skills">Skills</a></div>
                    <div><a href="https://www.linkedin.com/in/deepak-mauryaa/">Contact Me</a></div>
                </div>

            </div>

            <!-- hero section -->
            <div class="hero-section">

                <div class="hero-section-left">
                    <div class="hero-section-heading">Hi! Deepak Maurya</div>

                    <div class="hero-section-heading hero-section-sub-heading">
                        I am a <span class="role"></span>
                    </div>

                    <div class="hero-section-description">
                        I’m a passionate Frontend developer and here is my portfolio website. Here you’ll
                        learn about my journey as a developer.
                    </div>

                    <div class="btn">
                        <div class="btn-pink" id="btn"><a href="images/userAsset/Resume%20Deepak.pdf"
                                target="_blank">Hire me</a></div>
                    </div>

                </div>

                <!-- hero section right -->
                <div class="hero-section-right">
                    <div class="absolute icons icon-dots">
                        <img src="images/userAsset/dots.png" alt="" />
                    </div>
                    <div class="absolute icons icon-cube">
                        <img src="images/userAsset/cube.png" alt="" />
                    </div>
                    <div class="absolute icons icon-circle">
                        <img src="images/userAsset/circle.png" alt="" />
                    </div>
                    <div class="absolute icons icon-zigzag">
                        <img src="images/userAsset/zigzags.png" alt="" />
                    </div>
                    <div class="absolute icons icon-plus">
                        <img src="images/userAsset/plus.png" alt="" />
                    </div>
                    <div class="user-image">
                        <img src="images/userAsset/UserImage.png" alt="" />
                    </div>
                </div>
            </div>
        </div>

        <!-- scripts -->
        <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
        <script src="https://kit.fontawesome.com/58a810656e.js" crossorigin="anonymous"></script>
        <script>
            var typeData = new Typed(".role", {
                strings: [
                    "Frontend Developer",
                    "MERN Stack Developer",
                    "Web Developer",
                    "Coder",
                ],
                loop: true,
                typeSpeed: 100,
                backSpeed: 80,
                backDelay: 1000,
            });
        </script>

</body>

</html>
